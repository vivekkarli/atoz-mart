spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: always # to load data.sql file        
logging:
  level:
    com.netflix.discovery.DiscoveryClient: OFF
    com.atozmart.catalog: INFO
  pattern:
    level: "%5p [${spring.application.name}, %X{trace_id}, %X{span_id}]"